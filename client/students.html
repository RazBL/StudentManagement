<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תלמידים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <div class="min-vh-100 bg-secondary-subtle app-shell">
        <nav class="navbar bg-white border-bottom px-3 app-topbar">
            <a class="text-decoration-none text-dark" href="./dashboard.html">
                <h4 class="mb-0 teacher-name">מורה</h4>
                <p class="mb-0 text-muted">מורה</p>
            </a>
            <button class="btn btn-outline-primary menu-toggle" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">☰</button>
        </nav>

        <aside class="desktop-sidebar bg-white border-start">
            <div class="sidebar-inner d-flex flex-column h-100 p-3">
                <a class="text-decoration-none text-dark" href="./dashboard.html">
                    <div class="text-center mb-4">
                        <h5 class="mb-0 teacher-name">מורה</h5>
                        <small class="text-muted">מורה</small>
                    </div>
                </a>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link text-dark rounded" href="dashboard.html">דאשבורד</a></li>
                    <li class="nav-item"><a class="nav-link active bg-primary text-white rounded"
                            href="students.html">תלמידים</a></li>
                    <li class="nav-item"><a class="nav-link text-dark rounded" href="tasks.html">מטלות</a></li>
                </ul>
                <button class="btn btn-outline-danger w-100 mt-auto logout-btn">התנתקות</button>
            </div>
        </aside>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="sidebarMenuLabel">תפריט</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column">
                <a class="text-decoration-none text-dark text-center mb-4" href="./dashboard.html">
                    <h5 class="mb-0 teacher-name">מורה</h5>
                    <small class="text-muted">מורה</small>
                </a>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link text-dark rounded" href="dashboard.html">דאשבורד</a></li>
                    <li class="nav-item"><a class="nav-link active bg-primary text-white rounded"
                            href="students.html">תלמידים</a></li>
                    <li class="nav-item"><a class="nav-link text-dark rounded" href="tasks.html">מטלות</a></li>
                </ul>
                <button class="btn btn-outline-danger w-100 mt-auto logout-btn">התנתקות</button>
            </div>
        </div>

        <div class="app-content">
            <div class="container-fluid px-3 px-lg-4 pt-3">
                <button id="addStudentButton" class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#addStudentCard"
                    aria-expanded="false" aria-controls="addStudentCard">הוסף תלמיד</button>
            </div>

            <div class="collapse mt-3 container-fluid px-3 px-lg-4" id="addStudentCard">
                <div class="card card-body">
                    <h5 id="studentFormTitle" class="card-title mb-3">הוספת תלמיד חדש</h5>
                    <form id="studentForm">
                        <div class="mb-3">
                            <label for="studentName" class="form-label">שם תלמיד</label>
                            <input type="text" class="form-control" id="studentName" required>
                        </div>
                        <div class="mb-3">
                            <label for="studentClass" class="form-label">כיתה</label>
                            <select class="form-select" id="studentClass" required>
                                <option value="" selected disabled>בחר</option>
                                <option value="א">א</option>
                                <option value="ב">ב</option>
                                <option value="ג">ג</option>
                                <option value="ד">ד</option>
                                <option value="ה">ה</option>
                                <option value="ו">ו</option>
                                <option value="ז">ז</option>
                                <option value="ח">ח</option>
                                <option value="ט">ט</option>
                                <option value="י">י</option>
                                <option value="יא">יא</option>
                                <option value="יב">יב</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="studentPhone" class="form-label">טלפון</label>
                            <input type="tel" class="form-control phone-number text-end" id="studentPhone" inputmode="numeric"
                                maxlength="10" pattern="05[0-9]-?[0-9]{7}" dir="ltr" required>
                        </div>
                        <div class="d-flex gap-2 flex-wrap">
                            <button type="submit" class="btn btn-primary">שמירה</button>
                            <button type="button" class="btn btn-secondary" data-bs-toggle="collapse"
                                data-bs-target="#addStudentCard">ביטול</button>
                        </div>
                    </form>
                </div>
            </div>

            <main class="container-fluid px-3 px-lg-4 mt-3 pb-3">
                <div class="card text-bg-light mb-3 p-4 text-center">
                    <div class="d-flex flex-row justify-content-between mb-3">
                        <h5>תלמידים</h5>
                    </div>
                    <div class="mb-3 text-start">
                        <input type="search" class="form-control" id="studentSearch" placeholder="חיפוש...">
                    </div>
                    <div class="students-table-wrap table-responsive d-none d-md-block">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th scope="col">שם</th>
                                    <th scope="col">כיתה</th>
                                    <th scope="col">טלפון</th>
                                    <th scope="col">פעולות</th>
                                </tr>
                            </thead>
                            <tbody class="students"></tbody>
                        </table>
                    </div>
                    <div id="studentsCards" class="students-cards d-md-none d-flex flex-column gap-3"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/students.js"></script>
</body>

</html>
