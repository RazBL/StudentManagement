<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
    <title>לוח ניהול</title>
</head>

<body>
    <div class="min-vh-100 bg-secondary-subtle app-shell">
        <nav class="navbar bg-white border-bottom px-3 app-topbar">
            <a class="text-decoration-none text-dark" href="./dashboard.html">
                <h4 class="mb-0 teacher-name">מורה</h4>
                <p class="mb-0 text-muted">מורה</p>
            </a>

            <button class="btn btn-outline-primary menu-toggle" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                ☰
            </button>
        </nav>

        <aside class="desktop-sidebar bg-white border-start">
            <div class="sidebar-inner d-flex flex-column h-100 p-3">
                <a class="text-decoration-none text-dark" href="./dashboard.html">
                    <div class="text-center mb-4">
                        <h5 class="mb-0 teacher-name">מורה</h5>
                        <small class="text-muted">מורה</small>
                    </div>
                </a>

                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link active bg-primary text-white rounded" href="dashboard.html">דאשבורד</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark rounded" href="students.html">תלמידים</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark rounded" href="tasks.html">מטלות</a>
                    </li>
                </ul>

                <button class="btn btn-outline-danger w-100 mt-auto logout-btn">התנתקות</button>
            </div>
        </aside>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="sidebarMenuLabel">תפריט</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>

            <div class="offcanvas-body d-flex flex-column">
                    <div class="text-center mb-4">
                        <h5 class="mb-0 teacher-name">מורה</h5>
                        <small class="text-muted">מורה</small>
                    </div>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link active bg-primary text-white rounded" href="dashboard.html">דאשבורד</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark rounded" href="students.html">תלמידים</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark rounded" href="tasks.html">מטלות</a>
                    </li>
                </ul>

                <button class="btn btn-outline-danger w-100 mt-auto logout-btn">התנתקות</button>
            </div>
        </div>

        <div class="app-content">
            <main class="container-fluid px-3 px-lg-4 pt-3">
                <div class="row row-cols-2 g-3 mb-3">
                    <div class="col">
                        <div class="card text-bg-light p-3 text-center h-100">
                            <p class="mb-0">תלמידים</p>
                            <h4 id="studentsCount" class="mt-3 mb-0">0</h4>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card text-bg-light p-3 text-center h-100">
                            <p class="mb-0">מטלות פתוחות</p>
                            <h4 id="tasksCount" class="mt-3 mb-0">0</h4>
                        </div>
                    </div>
                </div>
            </main>

            <main class="container-fluid px-3 px-lg-4 pb-3">
                <div class="card text-bg-light mb-3 p-4">
                    <div class="d-flex flex-row justify-content-between align-items-center gap-3 mb-3">
                        <p class="mb-0">תלמידים אחרונים</p>
                        <a href="students.html">צפייה בהכל</a>
                    </div>

                    <div id="latestStudentsCards" class="row row-cols-1 row-cols-md-3 g-3"></div>
                </div>

                <div class="card text-bg-light mb-3 p-4">
                    <div class="d-flex flex-row justify-content-between align-items-center gap-3 mb-3">
                        <p class="mb-0">מטלות</p>
                        <a href="tasks.html">צפייה בהכל</a>
                    </div>

                    <div class="dashboard-tasks-table table-responsive d-none d-lg-block">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th scope="col">מטלה</th>
                                    <th scope="col">כיתה</th>
                                    <th scope="col">תאריך הגשה</th>
                                    <th scope="col">סטטוס</th>
                                    <th scope="col">הושלם</th>
                                </tr>
                            </thead>
                            <tbody id="tasksTableBody"></tbody>
                        </table>
                    </div>

                    <div id="tasksList" class="dashboard-tasks-list d-flex d-lg-none flex-column gap-3"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/dashboard.js"></script>
</body>

</html>
